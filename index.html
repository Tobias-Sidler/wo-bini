<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        #info-box {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 10px; border-radius: 5px;
            font-family: Arial, sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="info-box">Last updated: <span id="time">Loading...</span></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        // Check if we already have the password saved locally, if not, ask for it
        let password = localStorage.getItem('map_password');
        if (!password) {
            password = prompt("Enter the decryption password:");
            localStorage.setItem('map_password', password);
        }

        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let marker = null;

        async function updateMap() {
            try {
                const response = await fetch('./location.json?t=' + new Date().getTime());
                const envelope = await response.json();
                const encryptedText = envelope.encrypted;

                // Derive key and IV exactly like the Python script
                const key = CryptoJS.SHA256(password);
                const iv = CryptoJS.enc.Utf8.parse('0123456789abcdef');

                // Decrypt
                const decrypted = CryptoJS.AES.decrypt(encryptedText, key, { iv: iv });
                const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);
                
                // Parse the inner JSON
                const data = JSON.parse(decryptedText);
                
                const lat = data.lat;
                const lng = data.lng;
                document.getElementById('time').innerText = data.time;

                if (!marker) {
                    marker = L.marker([lat, lng]).addTo(map);
                    map.setView([lat, lng], 15);
                } else {
                    marker.setLatLng([lat, lng]);
                }
            } catch (error) {
                console.error("Decryption failed. Wrong password?");
                // Clear saved password if it fails so they can try again on refresh
                localStorage.removeItem('map_password');
                document.getElementById('time').innerText = "Decryption Error (Wrong Password)";
            }
        }

        updateMap();
        setInterval(updateMap, 30000);
    </script>
</body>
</html>
