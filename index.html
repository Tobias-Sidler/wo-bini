<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Path Mapping Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        
        #control-panel {
            position: absolute; top: 10px; left: 50px; z-index: 1000;
            background: white; padding: 15px; border-radius: 8px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); width: 260px;
        }
        .status-badge {
            display: inline-block; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; font-weight: bold; color: white; margin-bottom: 10px;
            text-transform: uppercase;
        }
        .online { background: #2ecc71; }
        .stationary { background: #3498db; } /* Nice blue color for idling */
        .offline { background: #e74c3c; }
        
        .time-row { margin-bottom: 6px; font-size: 13px; color: #333; }
        
        select {
            width: 100%; padding: 6px; margin-top: 10px;
            border-radius: 4px; border: 1px solid #ccc; font-size: 13px;
        }
        
        .heart-icon {
            font-size: 32px; text-shadow: 0 2px 5px rgba(0,0,0,0.3);
            text-align: center; line-height: 1;
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div id="status" class="status-badge offline">Checking...</div>
        <div class="time-row"><strong>Letztes GPS-Update:</strong><br><span id="time">Loading...</span></div>
        <div class="time-row"><strong>Letzter Herzschlag-Ping:</strong><br><span id="ping-time">Loading...</span></div>
        
        <label for="time-filter"><strong>Anzeige:</strong></label>
        <select id="time-filter" onchange="filterAndRender()">
            <option value="all">Alles</option>
            <option value="1">Heute</option>
            <option value="3">Letzte 3 Tage</option>
            <option value="7">Letzte Woche</option>
        </select>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <script>
        let password = localStorage.getItem('map_password');
        if (!password) {
            password = prompt("Enter the decryption password:");
            localStorage.setItem('map_password', password);
        }

        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let rawTrackingHistory = [];
        let expectedIntervalMs = 300000; 
        
        const markerGroup = L.layerGroup().addTo(map);
        const pathGroup = L.layerGroup().addTo(map);

        const heartIcon = L.divIcon({
            html: '❤️',
            className: 'heart-icon',
            iconSize: [32, 32],
            iconAnchor: [16, 32]
        });

        async function fetchData() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/Tobias-Sidler/wo-bini/main/location.json?t=' + new Date().getTime());
                const envelope = await response.json();
                
                expectedIntervalMs = envelope.interval_ms || 300000;
                const lastPingTime = envelope.last_ping || Date.now();
                
                // Display the readable local time for the raw background ping
                document.getElementById('ping-time').innerText = new Date(lastPingTime).toLocaleTimeString();
                
                const key = CryptoJS.SHA256(password);
                const iv = CryptoJS.enc.Utf8.parse('0123456789abcdef');
                
                const cipherParams = CryptoJS.lib.CipherParams.create({
                    ciphertext: CryptoJS.enc.Base64.parse(envelope.encrypted)
                });

                const decrypted = CryptoJS.AES.decrypt(cipherParams, key, { 
                    iv: iv, 
                    mode: CryptoJS.mode.CBC, 
                    padding: CryptoJS.pad.Pkcs7 
                });
                
                const decryptedText = decrypted.toString(CryptoJS.enc.Utf8);
                rawTrackingHistory = JSON.parse(decryptedText);

                // --- NEW STATUS BADGE LOGIC ENGINE ---
                const statusBadge = document.getElementById('status');
                const now = Date.now();
                
                const latestPoint = rawTrackingHistory[rawTrackingHistory.length - 1];

                // 1. Check if the script has stopped completely (No ping received for over 2 cycles)
                if ((now - lastPingTime) > (expectedIntervalMs * 2)) {
                    statusBadge.innerText = "OFFLINE";
                    statusBadge.className = "status-badge offline";
                } 
                // 2. Check if a ping arrived, but the location timestamp wasn't updated (Stationary)
                // We add a tiny 2-second (2000ms) buffer for hardware calculation alignment
                else if (lastPingTime > (latestPoint.timestamp + 2000)) {
                    statusBadge.innerText = "KEINE BEWEGUNG";
                    statusBadge.className = "status-badge stationary";
                } 
                // 3. The ping and location match up perfectly (Active tracking)
                else {
                    statusBadge.innerText = "ONLINE";
                    statusBadge.className = "status-badge online";
                }
                // -------------------------------------

                filterAndRender();
            } catch (error) {
                console.error("Decryption pipeline error:", error);
                document.getElementById('time').innerText = "Auth Configuration Error";
                localStorage.removeItem('map_password'); 
            }
        }

        function filterAndRender() {
            if (rawTrackingHistory.length === 0) return;

            markerGroup.clearLayers();
            pathGroup.clearLayers();

            const filterValue = document.getElementById('time-filter').value;
            const now = Date.now();
            
            let filteredPoints = rawTrackingHistory.filter(point => {
                if (filterValue === 'all') return true;
                const daysLimitMs = parseInt(filterValue) * 24 * 60 * 60 * 1000;
                return (now - point.timestamp) <= daysLimitMs;
            });

            if (filteredPoints.length === 0) return;

            const latestPoint = rawTrackingHistory[rawTrackingHistory.length - 1];
            // Dynamically construct a 24-hour YYYY-MM-DD HH:MM string from the millisecond timestamp
            const gpsDate = new Date(latestPoint.timestamp);
            const yyyy = gpsDate.getFullYear();
            const mm = String(gpsDate.getMonth() + 1).padStart(2, '0');
            const dd = String(gpsDate.getDate()).padStart(2, '0');
            const hh = String(gpsDate.getHours()).padStart(2, '0');
            const min = String(gpsDate.getMinutes()).padStart(2, '0');
            
            document.getElementById('time').innerText = `${yyyy}-${mm}-${dd} ${hh}:${min}`;

            for (let i = 0; i < filteredPoints.length; i++) {
                const current = filteredPoints[i];
                const isLatest = (current.timestamp === latestPoint.timestamp);

                if (isLatest) {
                    L.marker([current.lat, current.lng], { icon: heartIcon })
                     .addTo(markerGroup)
                     .bindPopup(`<b>Current Location</b><br>${current.time}`);
                } else {
                    const ageRatio = i / filteredPoints.length; 
                    L.circleMarker([current.lat, current.lng], {
                        radius: 5 + (ageRatio * 3),
                        color: '#9b59b6',
                        fillColor: '#9b59b6',
                        fillOpacity: 0.1 + (ageRatio * 0.6),
                        opacity: 0.2 + (ageRatio * 0.6)
                    }).addTo(markerGroup).bindPopup(`History Coordinate Point:<br>${current.time}`);
                }

                if (i > 0) {
                    const previous = filteredPoints[i - 1];
                    const distanceMeters = map.distance([previous.lat, previous.lng], [current.lat, current.lng]);
                    const timeSeconds = (current.timestamp - previous.timestamp) / 1000;
                    const speedKmh = timeSeconds > 0 ? (distanceMeters / timeSeconds) * 3.6 : 0;

                    const isDriving = (speedKmh > 15 || current.speed * 3.6 > 15);
                    const lineTrackColor = isDriving ? '#e67e22' : '#2bc0d8'; 
                    const lineWeight = isDriving ? 4 : 2;

                    L.polyline([[previous.lat, previous.lng], [current.lat, current.lng]], {
                        color: lineTrackColor,
                        weight: lineWeight,
                        opacity: 0.3 + ((i / filteredPoints.length) * 0.6),
                        dashArray: isDriving ? '1, 6' : 'none' 
                    }).addTo(pathGroup);
                }
            }

            map.setView([latestPoint.lat, latestPoint.lng], 14);
        }

        fetchData();
        setInterval(fetchData, 30000); 
    </script>
</body>
</html>
