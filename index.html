<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobis Abenteuer-Karte ❤️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map { height: 100%; margin: 0; padding: 0; }
        
        #control-panel {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: rgba(255, 255, 255, 0.95); padding: 18px; border-radius: 12px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 280px;
            backdrop-filter: blur(5px);
        }
        
        .status-badge {
            display: inline-block; padding: 5px 12px; border-radius: 20px;
            font-size: 11px; font-weight: bold; color: white; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .online { background: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.5); }
        .stationary { background: #3498db; }
        .offline { background: #e74c3c; }
        
        .time-row { margin-bottom: 8px; font-size: 13px; color: #2c3e50; line-height: 1.4; }
        .time-row strong { color: #34495e; }
        
        .toggle-container {
            margin-top: 12px; padding-top: 12px; border-top: 1px solid #eee;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; font-weight: bold; color: #2c3e50;
        }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: #e74c3c; }
        input:checked + .slider:before { transform: translateX(20px); }

        select {
            width: 100%; padding: 8px; margin-top: 8px;
            border-radius: 6px; border: 1px solid #ccc; font-size: 13px;
            background: white; color: #333; cursor: pointer;
        }

        #stats-panel {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(255, 255, 255, 0.95);
            padding: 10px 25px; border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            display: flex; gap: 30px; font-family: sans-serif; text-align: center;
            backdrop-filter: blur(5px); border: 1px solid rgba(231, 76, 60, 0.2);
        }
        .stat-box { display: flex; flex-direction: column; }
        .stat-val { font-size: 18px; font-weight: bold; color: #e74c3c; }
        .stat-lbl { font-size: 11px; color: #7f8c8d; text-transform: uppercase; margin-top: 2px; }

        .custom-avatar-marker {
            width: 50px; height: 50px;
            border-radius: 50%; border: 3px solid #e74c3c;
            box-shadow: 0 3px 10px rgba(0,0,0,0.3);
            background-size: cover; background-position: center;
            animation: pulseGlow 2s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 5px rgba(231, 76, 60, 0.5); }
            100% { box-shadow: 0 0 15px rgba(231, 76, 60, 0.9), 0 0 4px #e74c3c; }
        }
    </style>
</head>
<body>

    <div id="control-panel">
        <div id="status" class="status-badge offline">Verbinden...</div>
        <div class="time-row"><strong>Letzte Position:</strong> <span id="relative-time">Warten...</span><br><small style="color:#7f8c8d" id="exact-time"></small></div>
        <div class="time-row"><strong>Letzter Cloud-Ping:</strong> <span id="relative-ping">Warten...</span></div>
        <div class="time-row"><strong>Telefon-Batterie:</strong> <span id="battery">Lädt...</span></div>
        
        <div class="toggle-container">
            <span>Automatisch folgen</span>
            <label class="switch">
                <input type="checkbox" id="auto-follow" checked>
                <span class="slider"></span>
            </label>
        </div>

        <label for="view-mode" style="font-size: 12px; margin-top: 10px; display: block; color: #7f8c8d;"><strong>Ansichtsmodus:</strong></label>
        <select id="view-mode" onchange="filterAndRender()">
            <option value="follow">Follow (Verblassend, max. 24h)</option>
            <option value="3days">Letzte 3 Tage</option>
            <option value="1week">Letzte Woche</option>
            <option value="whole">Ganzer Trip (Bis zu 20 Tage)</option>
        </select>
    </div>

    <div id="stats-panel">
        <div class="stat-box"><span class="stat-val" id="stat-dist">0.0 km</span><span class="stat-lbl">Strecke Heute</span></div>
        <div class="stat-box"><span class="stat-val" id="stat-speed">0.0 km/h</span><span class="stat-lbl">Tempo</span></div>
        <div class="stat-box"><span class="stat-val" id="stat-start">--:--</span><span class="stat-lbl">Startzeit</span></div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Smooth slide engine integration
        L.Marker.prototype.slideTo = function (latlng, options) {
            options = options || {};
            this._duration = options.duration || 1000;
            this._startLatLng = this.getLatLng();
            this._targetLatLng = L.latLng(latlng);
            this._startTime = performance.now();
            
            const animate = (time) => {
                let progress = (time - this._startTime) / this._duration;
                if (progress > 1) progress = 1;
                let lat = this._startLatLng.lat + (this._targetLatLng.lat - this._startLatLng.lat) * progress;
                let lng = this._startLatLng.lng + (this._targetLatLng.lng - this._startLatLng.lng) * progress;
                this.setLatLng([lat, lng]);
                if (progress < 1) this._animationFrame = requestAnimationFrame(animate);
            };
            cancelAnimationFrame(this._animationFrame);
            this._animationFrame = requestAnimationFrame(animate);
        };

        const firebaseConfig = {
            databaseURL: "https://wo-ischer-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        const USER_IMAGE_URL = 'https://cdn-icons-png.flaticon.com/512/4333/4333609.png'; 

        let password = localStorage.getItem('map_password');
        if (!password) {
            password = prompt("Bitte gib das Entschlüsselungs-Passwort ein:");
            if (password) localStorage.setItem('map_password', password);
        }

        firebase.initializeApp(firebaseConfig);
        // Note: Connecting to '/points' listener branch node
        const databaseReference = firebase.database().ref('/points');

        const map = L.map('map').setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        let rawTrackingHistory = [];
        let expectedIntervalMs = 180000;
        let lastPingTimestamp = Date.now();
        let lastGpsTimestamp = Date.now();
        
        const pathGroup = L.layerGroup().addTo(map);
        let liveGlidingMarker = null;

        databaseReference.on('value', (snapshot) => {
            const dataSlices = snapshot.val();
            if (!dataSlices) return;
            
            try {
                let consolidatedPoints = [];
                let ultimateEnvelope = null;

                // Loop through all database slices, decrypt them, and compile them into a master array
                Object.keys(dataSlices).forEach(key => {
                    const envelope = dataSlices[key];
                    ultimateEnvelope = envelope; // Keep reference to track the newest battery/ping states

                    const cryptoKey = CryptoJS.SHA256(password);
                    const iv = CryptoJS.enc.Utf8.parse('0123456789abcdef');
                    const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext: CryptoJS.enc.Base64.parse(envelope.encrypted) });
                    const decrypted = CryptoJS.AES.decrypt(cipherParams, key, { iv: iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 });
                    
                    const pointsSlice = JSON.parse(decrypted.toString(CryptoJS.enc.Utf8));
                    if (Array.isArray(pointsSlice)) {
                        consolidatedPoints = consolidatedPoints.concat(pointsSlice);
                    }
                });

                // Sort chronological timelines safely
                consolidatedPoints.sort((a, b) => a.timestamp - b.timestamp);
                rawTrackingHistory = consolidatedPoints;

                if (rawTrackingHistory.length === 0) return;

                expectedIntervalMs = ultimateEnvelope.interval_ms || 180000;
                lastPingTimestamp = ultimateEnvelope.last_ping || Date.now();
                
                if (ultimateEnvelope.battery_level !== undefined) {
                    const bLevel = ultimateEnvelope.battery_level;
                    const bStatus = ultimateEnvelope.battery_status === "Charging" ? "⚡ Lädt" : "🔋 Akkubetrieb";
                    document.getElementById('battery').innerText = `${bLevel}% (${bStatus})`;
                }

                const latestPoint = rawTrackingHistory[rawTrackingHistory.length - 1];
                lastGpsTimestamp = latestPoint.timestamp;
                document.getElementById('exact-time').innerText = `(${format24h(new Date(lastGpsTimestamp))})`;

                updateTodayStats();
                
                const statusBadge = document.getElementById('status');
                const now = Date.now();
                if ((now - lastPingTimestamp) > (180000 * 2.5)) {
                    statusBadge.innerText = "OFFLINE";
                    statusBadge.className = "status-badge offline";
                } else if (lastPingTimestamp > (lastGpsTimestamp + 10000)) {
                    statusBadge.innerText = "PAUSE";
                    statusBadge.className = "status-badge stationary";
                } else {
                    statusBadge.innerText = "IN BEWEGUNG";
                    statusBadge.className = "status-badge online";
                }

                filterAndRender();
                updateTimeCounters();
            } catch (error) {
                console.error("Consolidation decryption loop error:", error);
                document.getElementById('status').innerText = "Passwort Fehler";
            }
        });

        function format24h(dateObj) {
            return `${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
        }

        function formatTimeAgo(timestamp) {
            const diffSeconds = Math.floor((Date.now() - timestamp) / 1000);
            if (diffSeconds < 5) return "Gerade eben";
            if (diffSeconds < 60) return `vor ${diffSeconds} Sek.`;
            const diffMinutes = Math.floor(diffSeconds / 60);
            if (diffMinutes < 60) return `vor ${diffMinutes} Min.`;
            return `vor ${Math.floor(diffMinutes / 60)} Std.`;
        }

        function updateTimeCounters() {
            if (rawTrackingHistory.length === 0) return;
            document.getElementById('relative-time').innerText = formatTimeAgo(lastGpsTimestamp);
            document.getElementById('relative-ping').innerText = formatTimeAgo(lastPingTimestamp);
        }
        setInterval(updateTimeCounters, 1000);

        function updateTodayStats() {
            if (rawTrackingHistory.length === 0) return;
            
            const startOfToday = new Date();
            startOfToday.setHours(0,0,0,0);
            const startOfTodayMs = startOfToday.getTime();

            let todayPoints = rawTrackingHistory.filter(p => p.timestamp >= startOfTodayMs);
            let totalMeters = 0;
            
            for (let i = 1; i < todayPoints.length; i++) {
                totalMeters += map.distance([todayPoints[i-1].lat, todayPoints[i-1].lng], [todayPoints[i].lat, todayPoints[i].lng]);
            }
            
            const totalKm = (totalMeters / 1000).toFixed(1);
            const latest = rawTrackingHistory[rawTrackingHistory.length - 1];
            const currentSpeedKmh = (latest.speed * 3.6).toFixed(1);
            
            const firstPointTime = todayPoints.length > 0 ? format24h(new Date(todayPoints[0].timestamp)) : "--:--";

            document.getElementById('stat-dist').innerText = `${totalKm} km`;
            document.getElementById('stat-speed').innerText = `${currentSpeedKmh} km/h`;
            document.getElementById('stat-start').innerText = firstPointTime;
        }

        function drawRoadSnappedLine(points, lineOpacity) {
            if (points.length < 2) return;
            const coordString = points.map(p => `${p.lng},${p.lat}`).join(';');
            const url = `https://router.project-osrm.org/route/v1/driving/${coordString}?overview=full&geometries=geojson`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                        const flippedCoordinates = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                        L.polyline(flippedCoordinates, { color: '#2bc0d8', weight: 4, opacity: lineOpacity }).addTo(pathGroup);
                    } else {
                        const straightCoords = points.map(p => [p.lat, p.lng]);
                        L.polyline(straightCoords, { color: '#e74c3c', weight: 3, opacity: lineOpacity, dashArray: '5,5' }).addTo(pathGroup);
                    }
                })
                .catch(() => {
                    const straightCoords = points.map(p => [p.lat, p.lng]);
                    L.polyline(straightCoords, { color: '#e74c3c', weight: 3, opacity: lineOpacity, dashArray: '5,5' }).addTo(pathGroup);
                });
        }

        function filterAndRender() {
            if (rawTrackingHistory.length === 0) return;

            pathGroup.clearLayers();
            const mode = document.getElementById('view-mode').value;
            const nowMs = Date.now();
            
            let filteredPoints = [];

            if (mode === 'follow') {
                const oneDayAgoMs = nowMs - (24 * 60 * 60 * 1000);
                filteredPoints = rawTrackingHistory.filter(p => p.timestamp >= oneDayAgoMs);
            } else if (mode === '3days') {
                const threeDaysAgoMs = nowMs - (3 * 24 * 60 * 60 * 1000);
                filteredPoints = rawTrackingHistory.filter(p => p.timestamp >= threeDaysAgoMs);
            } else if (mode === '1week') {
                const oneWeekAgoMs = nowMs - (7 * 24 * 60 * 60 * 1000);
                filteredPoints = rawTrackingHistory.filter(p => p.timestamp >= oneWeekAgoMs);
            } else {
                filteredPoints = [...rawTrackingHistory]; // Whole 20 days cumulative journey profile
            }

            if (filteredPoints.length === 0) return;

            // Route batching pipeline
            if (mode === 'follow') {
                const batchSize = 20;
                for (let i = 0; i < filteredPoints.length; i += batchSize - 1) {
                    const chunk = filteredPoints.slice(i, i + batchSize);
                    if (chunk.length < 2) break;
                    const ageRatio = i / filteredPoints.length;
                    drawRoadSnappedLine(chunk, 0.15 + (ageRatio * 0.65));
                }
            } else {
                const batchSize = 50;
                for (let i = 0; i < filteredPoints.length; i += batchSize - 1) {
                    const chunk = filteredPoints.slice(i, i + batchSize);
                    if (chunk.length < 2) break;
                    drawRoadSnappedLine(chunk, 0.75);
                }
            }

            // Dot clusters
            for (let i = 0; i < filteredPoints.length; i++) {
                const current = filteredPoints[i];
                let pointOpacity = 0.6;
                let pointFillOpacity = 0.3;
                
                if (mode === 'follow') {
                    const ageRatio = i / filteredPoints.length;
                    pointOpacity = 0.05 + (ageRatio * 0.55);
                    pointFillOpacity = 0.02 + (ageRatio * 0.28);
                }

                L.circleMarker([current.lat, current.lng], {
                    radius: 4,
                    color: '#9b59b6',
                    fillColor: '#9b59b6',
                    fillOpacity: pointFillOpacity,
                    opacity: pointOpacity
                }).addTo(pathGroup);
            }

            // Glide Avatar Targets
            const latestPoint = filteredPoints[filteredPoints.length - 1];
            const newTargetLatLng = [latestPoint.lat, latestPoint.lng];
            
            if (!liveGlidingMarker) {
                const avatarIcon = L.divIcon({
                    className: 'custom-avatar-marker-wrapper',
                    html: `<div class="custom-avatar-marker" style="background-image: url('${USER_IMAGE_URL}');"></div>`,
                    iconSize: [50, 50],
                    iconAnchor: [25, 25]
                });
                liveGlidingMarker = L.marker(newTargetLatLng, { icon: avatarIcon }).addTo(map);
                map.setView(newTargetLatLng, 15);
            } else {
                liveGlidingMarker.slideTo(newTargetLatLng, { duration: 2500 });
            }

            if (document.getElementById('auto-follow').checked) {
                setTimeout(() => {
                    map.panTo(newTargetLatLng, { animate: true, duration: 2.0 });
                }, 300);
            }
        }
    </script>
</body>
</html>
